  <rect x="300" y="960" width="600" height="150" rx="20" fill="#ffffff" fill-opacity="0.04" stroke="#7FC5EC" stroke-opacity="0.7" stroke-width="2.5" stroke-dasharray="12 10"/>
  <text x="600" y="1018" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#9FD2F0" text-anchor="middle" letter-spacing="6">USE CODE AT CHECKOUT</text>
  <text x="600" y="1080" font-family="'Courier New', monospace" font-size="56" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="4">DCAMEMBERSONLY</text>

