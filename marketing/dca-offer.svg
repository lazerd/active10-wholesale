  <!-- Logo badge -->
  <rect x="510" y="110" width="180" height="180" rx="40" fill="url(#logoG)"/>
  <text x="600" y="232" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">A10</text>

