  <text x="600" y="360" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">ACTIVE FORMULATIONS</text>
  <text x="600" y="402" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#7FC5EC" text-anchor="middle" letter-spacing="8">WHOLESALE PARTNER PROGRAM</text>

