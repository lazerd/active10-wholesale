  <rect x="430" y="470" width="340" height="48" rx="24" fill="#E8C76A" fill-opacity="0.14" stroke="#E8C76A" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="600" y="502" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#F4D77A" text-anchor="middle" letter-spacing="5">EXCLUSIVE · DIRECTORS CLUB</text>

  <!-- Headline -->
  <text x="600" y="600" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="#ffffff" text-anchor="middle">A welcome offer, just for you.</text>

  <!-- Big offer -->
  <text x="600" y="760" font-family="Arial, Helvetica, sans-serif" font-size="170" font-weight="900" fill="url(#gold)" text-anchor="middle" letter-spacing="-2">20% OFF</text>
  <text x="600" y="838" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="2">+ FREE SHIPPING</text>
  <text x="600" y="892" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#9FD2F0" text-anchor="middle">on your first wholesale order</text>

