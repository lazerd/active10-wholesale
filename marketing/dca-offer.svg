<svg width="1200" height="1500" viewBox="0 0 1200 1500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#00253D"/>
      <stop offset="0.55" stop-color="#003A5C"/>
      <stop offset="1" stop-color="#005A96"/>
    </linearGradient>
    <linearGradient id="logoG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0072BC"/>
      <stop offset="1" stop-color="#0088DD"/>
